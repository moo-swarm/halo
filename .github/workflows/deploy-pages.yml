# Deploy Halo Dashboard to GitHub Pages
#
# Runs:
#   - on every push to main (instant deploy)
#   - every 6 hours (fresh data)
#   - on workflow_dispatch (manual trigger)
#
# The data population script (moo-export-data.sh) runs on the
# OpenClaw host via cron and pushes data/swarm.json directly.
# This workflow only deploys the static site.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */6 * * *"    # every 6 hours
  workflow_dispatch:          # manual button in Actions tab

# Allow one concurrent deployment
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .                         # serve from repo root

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
