# Deploy Halo Dashboard to GitHub Pages
#
# Runs:
#   - on every push to main
#   - manual trigger (workflow_dispatch)
#
# Data is refreshed by the OpenClaw host cron via moo-export-data.sh,
# which pushes data/swarm.json directly to main.
# This workflow deploys the static site to the gh-pages branch.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to push to gh-pages branch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .               # serve from repo root
          publish_branch: gh-pages
          allow_empty_commit: false
          enable_cname: false          # CNAME already in repo
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
